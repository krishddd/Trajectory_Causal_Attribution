site_name: agent-replay
site_description: >-
  Record AI agent trajectories and find which step caused a failure via
  counterfactual step-ablation replay.
site_url: https://krishddd.github.io/Trajectory_Causal_Attribution/
repo_url: https://github.com/krishddd/Trajectory_Causal_Attribution
repo_name: krishddd/Trajectory_Causal_Attribution
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Connect any framework: frameworks.md
  - Design & analysis:
      - Component analysis: ANALYSIS.md
      - Verification & upgrade handoff: HANDOFF.md
      - Multiverse gaps: MULTIVERSE_GAPS.md
      - Research notes: RESEARCH_NOTES.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
